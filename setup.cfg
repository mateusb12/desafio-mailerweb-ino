[flake8]
max-line-length = 160
exclude = .venv, __pycache__, .git, .pytest_cache, build, dist, backend/alembic, backend/alembic/versions
ignore = W292, E302, E402, E704
per-file-ignores =
    __init__.py:F401
    backend/alembic/versions/*.py:ALL

[flake8:local-plugins]
extension =
    CMT = flake8_comments:NoCommentChecker
    DOT = flake8_comments:DocstringDotChecker
paths = .
