x-backend-common: &backend-common
  build: ./backend
  depends_on:
    db:
      condition: service_healthy
  environment:
    DATABASE_URL: postgresql://postgres:postgres@db:5432/meeting_rooms
  volumes:
    - ./backend:/app
    - /app/.venv

services:

  db:
    image: postgres:16
    container_name: meeting_room_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meeting_rooms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    <<: *backend-common
    container_name: meeting_room_backend
    ports:
      - "8000:8000"
    command: uvicorn source.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    <<: *backend-common
    container_name: meeting_room_worker
    command: python -m source.features.outbox.run_worker

  frontend:
    build: ./frontend
    container_name: meeting_room_frontend
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: npm run dev -- --host

volumes:
  postgres_data:
